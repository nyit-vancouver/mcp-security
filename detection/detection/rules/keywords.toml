# Capability definitions for static detection.

[[capabilities]]
name = "command_exec"
description = "Ability to spawn shell commands or subprocesses."
weight = 25.0
base_confidence = 0.4

  [[capabilities.indicators]]
  languages = ["python"]
  type = "keyword"
  patterns = [
    "subprocess.",
    "os.system(",
    "os.popen(",
    "pexpect.spawn(",
  ]

  [[capabilities.indicators]]
  languages = ["python"]
  type = "regex"
  pattern = "subprocess\\.(run|Popen|call)"

  [[capabilities.indicators]]
  languages = ["typescript", "javascript"]
  type = "keyword"
  patterns = [
    "child_process",
    "exec(",
    "spawn(",
  ]

  [[capabilities.indicators]]
  languages = ["metadata"]
  type = "keyword"
  case_sensitive = false
  patterns = [
    "exec",
    "bash",
    "eval",
    "shell",
    "rm -rf",
    "chmod",
    "chown",
  ]

[[capabilities]]
name = "file_read"
description = "Ability to read files from the host filesystem."
weight = 15.0
base_confidence = 0.35

  [[capabilities.indicators]]
  languages = ["python"]
  type = "keyword"
  patterns = [
    "open(",
    "pathlib.Path(",
    "os.listdir(",
  ]

  [[capabilities.indicators]]
  languages = ["python"]
  type = "regex"
  pattern = "open\\([^,]+,\\s*['\"]r"

  [[capabilities.indicators]]
  languages = ["typescript", "javascript"]
  type = "keyword"
  patterns = [
    "fs.readFile",
    "fs.readdir",
    "fs.createReadStream",
  ]

  [[capabilities.indicators]]
  languages = ["metadata"]
  type = "keyword"
  case_sensitive = false
  patterns = [
    "~/.ssh",
    "~/.cursor",
    "/etc/passwd",
    "read file",
    "extract",
    "steal",
  ]

