version: '3.8'

services:
  detection:
    build:
      context: ../detection
      dockerfile: Dockerfile
    volumes:
      - detection-results:/app/detection/examples/benchmarks/mcptox/output
    container_name: mcp-detection

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    volumes:
      - detection-results:/app/detection/examples/benchmarks/mcptox/output:ro
      - ./detection_rules.yaml:/app/web/detection_rules.yaml
    environment:
      - FLASK_ENV=production
    depends_on:
      detection:
        condition: service_completed_successfully
    restart: unless-stopped
    container_name: mcp-tool-detector

volumes:
  detection-results:
